<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cloud Design Patterns — Brain Tumor MRI{% endblock %}</title>

  <!-- Inline SVG favicon (avoids 404) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <!-- Chart.js 4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <!-- Custom -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark aaas-navbar">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="fa-solid fa-brain text-primary"></i>
      <span><strong>Cloud Design Patterns</strong> &mdash; Brain Tumor MRI</span>
    </a>
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link rounded px-3 {% if request.endpoint == 'index' %}active{% endif %}"
             href="/">
            <i class="fa-solid fa-upload me-1"></i> Classify
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link rounded px-3 {% if request.endpoint == 'benchmark' %}active{% endif %}"
             href="/benchmark">
            <i class="fa-solid fa-gauge-high me-1"></i> Benchmark
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link rounded px-3 {% if request.endpoint == 'about' %}active{% endif %}"
             href="/about">
            <i class="fa-solid fa-circle-info me-1"></i> About
          </a>
        </li>
        <li class="nav-item ms-2">
          <a class="nav-link rounded px-3 text-warning" href="/api/health" target="_blank">
            <i class="fa-solid fa-heart-pulse me-1"></i> Health
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page Content ──────────────────────────────────────────────────────────-->
<main>{% block content %}{% endblock %}</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="aaas-footer mt-5 py-4">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6 text-center text-md-start mb-2 mb-md-0">
        <small class="opacity-75">
          <i class="fa-solid fa-brain me-1 text-primary"></i>
          <strong>Cloud-Agnostic Design Patterns</strong> &mdash; Analytics as a Service for Medical Imaging
        </small>
      </div>
      <div class="col-md-6 text-center text-md-end">
        <small class="opacity-75">
          <span class="tech-pill"><i class="fa-brands fa-aws"></i> Lambda</span>
          <span class="tech-pill"><i class="fa-solid fa-cube"></i> Terraform</span>
          <span class="tech-pill"><i class="fa-solid fa-robot"></i> PyTorch</span>
          <span class="tech-pill"><i class="fa-brands fa-docker"></i> Docker</span>
        </small>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
